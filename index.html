<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Scout Cipher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap');

  :root {
    --khaki: #c8a96e;
    --dark-green: #2d4a1e;
    --forest: #3d6b2e;
    --cream: #f5ead8;
    --brown: #6b4226;
    --gold: #d4a017;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #1a2e0e;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.05) 40px, rgba(0,0,0,0.05) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.05) 40px, rgba(0,0,0,0.05) 41px);
    min-height: 100vh;
    font-family: 'Courier Prime', monospace;
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(16px, 4vw, 32px);
  }

  /* ── CARD ── */
  .card {
    background: linear-gradient(160deg, #1a2e0e 0%, #0e1c08 100%);
    border: 2px solid var(--forest);
    border-radius: 16px;
    padding: clamp(20px, 5vw, 36px) clamp(18px, 5vw, 32px);
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(16px, 3vw, 22px);
    box-shadow: 0 12px 48px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* ── TITLE ── */
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    color: var(--gold);
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 2px 2px 0 var(--brown);
    line-height: 1;
  }

  .title-sub {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.6rem, 1.8vw, 0.72rem);
    color: var(--khaki);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-top: 2px;
  }

  /* ── WHEEL ── */
  .wheel-wrap {
    width: min(calc(100vw - 80px), 300px);
    aspect-ratio: 1;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.7));
    touch-action: none;
  }

  #wheel-svg { width: 100%; height: 100%; display: block; }

  .outer-letter {
    font-family: 'Bebas Neue', sans-serif; font-size: 13px;
    fill: var(--cream); text-anchor: middle; dominant-baseline: central;
    pointer-events: none;
  }
  .inner-letter {
    font-family: 'Bebas Neue', sans-serif; font-size: 11px;
    fill: var(--gold); text-anchor: middle; dominant-baseline: central;
    pointer-events: none;
  }
  #inner-group {
    transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin: 160px 160px;
  }

  /* ── SHIFT COUNTER ── */
  .shift-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--forest);
    border-radius: 40px;
    padding: 7px 22px;
  }

  .shift-lbl {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.6rem, 1.8vw, 0.72rem);
    color: var(--khaki);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .shift-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2rem);
    color: var(--gold);
    min-width: 32px;
    text-align: center;
    line-height: 1;
  }

  /* ── BUTTONS ── */
  .btn-row {
    display: flex;
    gap: clamp(8px, 2vw, 12px);
  }

  .btn {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.72rem, 2.2vw, 0.84rem);
    padding: clamp(9px, 2vw, 12px) clamp(16px, 4vw, 26px);
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.14s ease;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .btn-rotate {
    background: var(--dark-green);
    color: var(--cream);
    border: 2px solid var(--forest);
    min-width: clamp(110px, 28vw, 130px);
  }
  .btn-rotate:hover, .btn-rotate:active {
    background: var(--forest);
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }

  .btn-reset {
    background: transparent;
    color: var(--khaki);
    border: 2px solid #3a3a3a;
    font-size: clamp(0.62rem, 1.8vw, 0.74rem);
    padding: 9px 16px;
  }
  .btn-reset:hover, .btn-reset:active { border-color: var(--khaki); color: var(--cream); }

  /* ── LEGEND ── */
  .legend {
    width: 100%;
    background: rgba(0,0,0,0.25);
    border: 1px solid #2a3a1a;
    border-radius: 10px;
    padding: clamp(12px, 3vw, 16px);
  }

  .legend-title {
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.6rem, 1.8vw, 0.7rem);
    color: var(--khaki);
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 12px;
  }

  .legend-keys {
    display: flex;
    justify-content: center;
    gap: clamp(16px, 5vw, 32px);
    margin-bottom: 12px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Special Elite', cursive;
    font-size: clamp(0.65rem, 1.8vw, 0.76rem);
    color: var(--khaki);
    letter-spacing: 1px;
  }

  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-outer { background: var(--cream); border: 2px solid #888; }
  .dot-inner { background: var(--gold);  border: 2px solid var(--brown); }

  .legend-divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent, #2a3a1a, transparent);
    margin: 10px 0;
  }

  .legend-note {
    font-size: clamp(0.6rem, 1.7vw, 0.7rem);
    color: #7a9a6a;
    text-align: center;
    line-height: 1.7;
    letter-spacing: 0.5px;
  }
  .legend-note strong { color: var(--khaki); }
</style>
</head>
<body>

<div class="card">

  <!-- Title -->
  <div>
    <div class="title">⚜ The Scout Cipher ⚜</div>
    <div class="title-sub">Caesar Cipher Wheel</div>
  </div>

  <!-- Wheel -->
  <div class="wheel-wrap" id="wheel-wrap">
    <svg id="wheel-svg" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="og" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#2d4a1e"/>
          <stop offset="100%" stop-color="#1a2e0e"/>
        </radialGradient>
        <radialGradient id="ig" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#4a3010"/>
          <stop offset="100%" stop-color="#2d1e08"/>
        </radialGradient>
        <filter id="sh">
          <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.5"/>
        </filter>
      </defs>

      <!-- Outer ring -->
      <circle cx="160" cy="160" r="154" fill="url(#og)" stroke="#c8a96e" stroke-width="2.5" filter="url(#sh)"/>
      <g id="outer-ticks"></g>
      <g id="outer-letters"></g>

      <!-- Inner ring (rotates) -->
      <g id="inner-group">
        <circle cx="160" cy="160" r="110" fill="url(#ig)" stroke="#d4a017" stroke-width="2"/>
        <g id="inner-letters"></g>
      </g>

      <!-- Center hub -->
      <circle cx="160" cy="160" r="30" fill="#1a1005" stroke="#d4a017" stroke-width="2"/>
      <text x="160" y="154" font-family="'Bebas Neue',sans-serif" font-size="9" fill="#d4a017" text-anchor="middle" letter-spacing="1">SHIFT</text>
      <text x="160" y="170" id="center-num" font-family="'Bebas Neue',sans-serif" font-size="17" fill="#d4a017" text-anchor="middle" dominant-baseline="central">0</text>

      <!-- Pointer -->
      <polygon points="160,5 153,20 167,20" fill="#d4a017"/>
    </svg>
  </div>

  <!-- Shift counter -->
  <div class="shift-row">
    <span class="shift-lbl">Shift</span>
    <span class="shift-num" id="shift-val">0</span>
    <span class="shift-lbl">Positions</span>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-rotate" onclick="rotate(-1)">◀ Left</button>
    <button class="btn btn-rotate" onclick="rotate(1)">Right ▶</button>
    <button class="btn btn-reset"  onclick="resetWheel()">↺ Reset</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">🗝 Legend</div>

    <div class="legend-keys">
      <div class="legend-item">
        <div class="legend-dot dot-outer"></div>
        <span>Outer Ring = <strong style="color:var(--cream)">Coded</strong> Letter</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot dot-inner"></div>
        <span>Inner Ring = <strong style="color:var(--gold)">Decoded</strong> Letter</span>
      </div>
    </div>

    <hr class="legend-divider">

    <div class="legend-note">
      Find the <strong>coded letter</strong> on the outer ring.<br>
      The letter directly below it on the inner ring is its <strong>decoded letter</strong>.<br>
      Rotate until the message makes sense!
    </div>
  </div>

</div>

<script>
  const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  let shift = 0;

  function buildWheel() {
    const cx=160, cy=160, oR=136, iR=93;
    const oG = document.getElementById('outer-letters');
    const tG = document.getElementById('outer-ticks');
    const iG = document.getElementById('inner-letters');

    for (let i=0; i<26; i++) {
      const a = (i*360/26 - 90) * Math.PI/180;

      // Outer letter
      const ot = el('text');
      ot.setAttribute('x', cx + oR*Math.cos(a));
      ot.setAttribute('y', cy + oR*Math.sin(a));
      ot.setAttribute('class','outer-letter');
      ot.textContent = ALPHA[i];
      oG.appendChild(ot);

      // Tick mark
      const ln = el('line');
      ln.setAttribute('x1', cx+145*Math.cos(a)); ln.setAttribute('y1', cy+145*Math.sin(a));
      ln.setAttribute('x2', cx+153*Math.cos(a)); ln.setAttribute('y2', cy+153*Math.sin(a));
      ln.setAttribute('stroke','#c8a96e'); ln.setAttribute('stroke-width','1.5');
      tG.appendChild(ln);

      // Inner letter
      const it = el('text');
      it.setAttribute('x', cx + iR*Math.cos(a));
      it.setAttribute('y', cy + iR*Math.sin(a));
      it.setAttribute('class','inner-letter');
      it.textContent = ALPHA[i];
      iG.appendChild(it);
    }
  }

  function el(tag) {
    return document.createElementNS('http://www.w3.org/2000/svg', tag);
  }

  function rotate(dir) {
    shift = ((shift + dir) % 26 + 26) % 26;
    document.getElementById('inner-group').style.transform = `rotate(${shift*(360/26)}deg)`;
    document.getElementById('shift-val').textContent  = shift;
    document.getElementById('center-num').textContent = shift;
  }

  function resetWheel() {
    shift = 0;
    document.getElementById('inner-group').style.transform = 'rotate(0deg)';
    document.getElementById('shift-val').textContent  = '0';
    document.getElementById('center-num').textContent = '0';
  }

  /* Touch swipe */
  let tx=0, ty=0;
  const ww = document.getElementById('wheel-wrap');
  ww.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
  ww.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx)>18) rotate(dx>0?1:-1);
    else if (Math.abs(dy)>18) rotate(dy>0?1:-1);
  }, {passive:true});

  buildWheel();
</script>
</body>
</html>
